<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Linksee Chat</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #eef2f6;
        --panel: #ffffff;
        --text: #1f2937;
        --muted: #64748b;
        --line: #d8dee7;
        --accent: #2563eb;
        --accent-strong: #1d4ed8;
        --danger: #dc2626;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #eef2f6 0%, #dde6ef 100%);
        color: var(--text);
      }

      main {
        width: min(560px, calc(100vw - 48px));
        padding: 32px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 22px 60px rgba(15, 23, 42, 0.14);
      }

      .mark {
        width: 48px;
        height: 48px;
        display: grid;
        place-items: center;
        border-radius: 8px;
        background: #fee2e2;
        color: var(--danger);
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 18px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 24px;
        font-weight: 700;
        letter-spacing: 0;
      }

      p {
        margin: 0 0 18px;
        color: var(--muted);
        line-height: 1.7;
      }

      dl {
        margin: 18px 0 24px;
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #f8fafc;
      }

      dt {
        margin-bottom: 6px;
        color: var(--muted);
        font-size: 13px;
      }

      dd {
        margin: 0 0 14px;
        word-break: break-all;
        font-family: Consolas, "Cascadia Mono", monospace;
      }

      dd:last-child {
        margin-bottom: 0;
      }

      .actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      button {
        min-height: 40px;
        padding: 0 16px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fff;
        color: var(--text);
        font: inherit;
        cursor: pointer;
      }

      button.primary {
        border-color: var(--accent);
        background: var(--accent);
        color: #fff;
      }

      button.primary:hover {
        background: var(--accent-strong);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">!</div>
      <h1>无法连接到聊天服务器</h1>
      <p>客户端已经正常启动，但当前服务器没有响应。请确认服务器后端已启动、端口已放行，或检查桌面端服务器地址配置。</p>
      <dl>
        <dt>服务器地址</dt>
        <dd id="server">-</dd>
        <dt>错误信息</dt>
        <dd id="reason">-</dd>
      </dl>
      <div class="actions">
        <button class="primary" type="button" id="retry">重试连接</button>
      </div>
    </main>
    <script>
      const params = new URLSearchParams(window.location.search);
      const target = params.get("target") || "";
      document.getElementById("server").textContent = params.get("server") || "未配置";
      document.getElementById("reason").textContent = params.get("reason") || "服务器不可用";
      document.getElementById("retry").addEventListener("click", () => {
        if (target) window.location.href = target;
      });
    </script>
  </body>
</html>
